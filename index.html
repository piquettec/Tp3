<!doctype html>
<html lang="fr-CA">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Commander une brochure gratuite</title>
    </head>
    <body>
        <form action="" method="get">
            <fieldset>
                <legend>INFORMATION DE CONTACT</legend>
                <div>
                    <label for="prenom">Prénom</label>
                    <input name="prenom" id="prenom" type="text">
                </div>
                <div>
                    <label for="nom">Nom</label>
                    <input name="nom" id="nom" type="text">
                </div>
                <div>
                    <label for="courriel">Courriel</label>
                    <input name="courriel" id="courriel" type="email">
                </div>
                <div>
                    <label for="telephone">Téléphone</label>
                    <input name="telephone" id="telephone" type="tel">
                </div>
            </fieldset>

            <fieldset>
                <legend>INFORMATIONS POSTALE</legend>
                <div>
                    <label for="adresse">Adresse</label>
                    <input name="adresse" id="adresse" type="text">
                </div>
                <div>
                    <select name="pays" id="pays">
                        <optgroup>
                            
                        </optgroup>
                    </select>
                </div>
            </fieldset>

            <button name="btnCommander" value="Commander">
                <img src="images/icon-arrow.svg" alt="Commander">
            </button>
        </form>
    </body>
</html>
