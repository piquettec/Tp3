<!doctype html>
<html lang="fr-CA">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Commander une brochure gratuite</title>
    </head>
    <body>
        <form action="" method="get">
            <fieldset>
                <legend>FORMAT DE LA BROCHURE</legend>
                <button name="btnImprime" value="Imprime">
                    <img src="images/icon-file-print.svg" alt="Imprime">Imprimé
                <button name="btnPDF" value="PDF">
                    <img src="images/icon-file-pdf.svg" alt="PDF">PDF
                <button name="btnePub" value="ePub">
                    <img src="images/icon-file-epub.svg" alt="ePub">ePub
            </fieldset>

            <fieldset>
                <legend>INFORMATION DE CONTACT</legend>
                <div>
                    <label for="prenom">Prénom</label>
                    <input name="prenom" id="prenom" type="text">
                </div>
                <div>
                    <label for="nom">Nom</label>
                    <input name="nom" id="nom" type="text">
                </div>
                <div>
                    <label for="courriel">Courriel <pattern>(exemple@domaine.com)</pattern></label>
                    <input name="courriel" id="courriel" type="email">
                </div>
                <div>
                    <label for="telephone">Téléphone <pattern>(438-019-1846)</pattern></label>
                    <input name="telephone" id="telephone" type="tel">
                </div>
            </fieldset>

            <fieldset>
                <legend>INFORMATIONS POSTALE</legend>
                <div>
                    <label for="adresse">Adresse <pattern>(123, rue principal)</pattern></label>
                    <input name="adresse" id="adresse" type="text">
                </div>
                <div>
                    <legend>pays</legend>
                    <select name="pays" id="pays">
                        <option value="">-- Sélectionner --</option>
                        <option value="Canada">Canada</option>
                        <option value="États-Unis">États-Unis</option>
                    </select>
                </div>
                <div>
                  <legend>Province ou État</legend>
                    <select name="Province_État" id="Province_État">
                        <optgroup label="Canada">
                            <option value="">-- Sélectionner --</option>
                            <option value="QC">Québec</option>
                            <option value="AB">Alberta</option>
                            <option value="BC">Colombie-Britannique</option>
                            <option value="PE">Île-du-prince-Édouard</option>
                            <option value="MB">Manitoba</option>
                            <option value="NB">Nouveau-Brunswick</option>
                            <option value="NS">Nouvelle-Écosse</option>
                            <option value="ON">Ontario</option>
                            <option value="SK">Saskatchewan</option>
                            <option value="NL">Terre-Neuve-et-Labrador</option>
                        </optgroup>
                        <optgroup label="États-Unis">
                            <option value="CA">Californie</option>
                            <option value="NY">New York</option>
                        </optgroup>
                    </select>
                </div>
                <div>
                    <label for="code_postal">Code postal <pattern>(A1A 1A1)</pattern></label>
                    <input name="code_postal" id="code_postal" type="text">
                </div>
            </fieldset>

            <button name="btnCommander" value="Commander">
                Commander
                <img src="images/icon-arrow.svg" alt="Commander">
            </button>
        </form>
    </body>
</html>
