<!doctype html>
<html lang="fr-CA">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Commander une brochure gratuite</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <header>
            <h2>PUBLICATION GRATUITE</h2>
            <h1>Commander une <em>brochure</em> gratuite</h1>
        </header>
        <form action="URL" method="get" class="formulaire">
            <fieldset name="format_brochure">
                <legend>FORMAT DE LA BROCHURE</legend>
                <ul class="choix_format">
                    <li class="bouton_radio">
                        <input class="screen-reader-only" type="radio" name="choix_format" id="choix_imprime" >
                        <label class="radio_button" for="choix_imprime">
                            <img src="images/icon-file-print.svg" alt="">
                            <span class="libele__imprime">Imprimé</span>
                        </label>
                    </li>
                    
                    <li class="bouton_radio">
                        <input class="screen-reader-only" type="radio" name="choix_format" id="choix_PDF" >
                        <label class="radio_button" for="choix_PDF">
                            <img src="images/icon-file-pdf.svg" alt="">
                            <span class="libele__imprime">PDF</span>
                        </label>
                    </li>

                    <li class="bouton_radio">
                        <input class="screen-reader-only" type="radio" name="choix_format" id="choix_ePub" >
                        <label class="radio_button" for="choix_ePub">
                            <img src="images/icon-file-epub.svg" alt="">
                            <span class="libele__imprime">ePub</span>
                        </label>
                    </li>
                </ul>
            </fieldset>

            <fieldset name="information_contact">
                <legend>INFORMATION DE CONTACT</legend>

                <div>
                    <label for="prenom">Prénom</label>
                    <input name="prenom" id="prenom" type="text">
                </div>
                <div>
                    <label for="nom">Nom</label>
                    <input name="nom" id="nom" type="text">
                </div>
                <div>
                    <label for="courriel">Courriel <span class="exemple__formulaire">(exemple@domaine.com)</span></label>
                    <input name="courriel" id="courriel" type="email">
                </div>
                <div>
                    <label for="telephone">Téléphone <span class="exemple__formulaire">(438-019-1846)</span></label>
                    <input name="telephone" id="telephone" type="tel">
                </div>
            </fieldset>

            <fieldset name="information_postal">
                <legend>INFORMATIONS POSTALE</legend>
                <div>
                    <label for="adresse">Adresse <span class="exemple__formulaire">(123, rue principal)</span></label>
                    <input name="adresse" id="adresse" type="text">
                </div>
                <div>
                    <legend for="pays">pays</legend>
                    <select name="pays" id="pays">
                        <option value="">-- Sélectionner --</option>
                        <option value="Canada">Canada</option>
                        <option value="États-Unis">États-Unis</option>
                    </select>
                </div>
                <div>
                    <legend for="province_etat" >Province ou État</legend>
                    <select name="province_etat" id="Province_État">
                        <option value="">-- Sélectionner --</option>

                        <optgroup label="Canada">
                            <option value="QC">Québec</option>
                            <option value="AB">Alberta</option>
                            <option value="BC">Colombie-Britannique</option>
                            <option value="PE">Île-du-prince-Édouard</option>
                            <option value="MB">Manitoba</option>
                            <option value="NB">Nouveau-Brunswick</option>
                            <option value="NS">Nouvelle-Écosse</option>
                            <option value="ON">Ontario</option>
                            <option value="SK">Saskatchewan</option>
                            <option value="NL">Terre-Neuve-et-Labrador</option>
                        </optgroup>

                        <optgroup label="États-Unis">
                            <option value="CA">Californie</option>
                            <option value="NY">New York</option>
                        </optgroup>
                    </select>
                </div>
                <div>
                    <label for="code_postal">Code postal <span class="exemple__formulaire">(A1A 1A1)</span></label>
                    <input name="code_postal" id="code_postal" type="text">
                </div>
            </fieldset>

            <fieldset name="abonner">            
                <input type="checkbox" name="abonner" id="abonner">
                <label for="abonner">Je désire recevoir des informations mensuelles par courriel sur les nouvelles publications et ressources disponibles</label>
            </fieldset>

            <button name="btnCommander" value="Commander">
                Commander
                <img src="images/icon-arrow.svg" alt="Commander">
            </button>
        </form>
    </body>
</html>
